# config/base.yaml — 全局基础配置（所有 experiments/*.yaml 继承此文件）
# 真相来源：论文第 3/6 章实验环境。任何超参只能从 config 读，禁止硬编码。
#
# ★ Qwen3 迁移 (2026-06)：主干从 Qwen2.5 系列全面升级为 Qwen3 系列。
#   嵌入与重排同步切换为 Qwen3-Embedding / Qwen3-Reranker。

project: milrag
seed: 42
seeds: [42, 1337, 2024, 7, 31415]   # 论文口径：所有数值实验跑 5 个种子，报均值±标准差

paths:
  raw: data/raw
  kb: data/kb
  qa: data/qa
  adversarial: data/adversarial
  experiments: experiments        # 产出根目录：<exp_id>/<timestamp>/
  ckpts: experiments/ckpts

offline: true                       # HARD CONSTRAINT：运行时零外网。HF_HUB_OFFLINE=1
log_level: INFO

# ---- 设备（vGPU-48GB 单卡即可覆盖全部实验）----
device:
  type: cuda
  gpu_mem_gb: 48                   # vGPU-48GB：单卡跑通 29/31 实验（14B 需 offload）
  # Qwen3-8B fp16 ~16GB | Qwen3-14B fp16 ~28GB (device_map="auto" 可跑)
  # Qwen3-32B int4 ~18GB (机器标注，一次性任务)
  serve_gpu: "vGPU-48GB"

# ---- 模型本地路径（按 AutoDL 实际路径配置）----
# AutoDL: /root/autodl-tmp/models/
# 本地:   已改用 API 模式，以下路径仅 AutoDL 使用
models:
  # ★ 主干 LLM（Qwen3 系列，论文主线 Qwen3-8B）
  llm_backbone: /root/autodl-tmp/models/Qwen3-8B-Instruct
  llm_backbone_14b: /root/autodl-tmp/models/Qwen3-14B-Instruct   # 大模型对照（需 offload）
  llm_backbone_32b: /root/autodl-tmp/models/Qwen3-32B-Instruct    # 机器标注（int4 量化后 ~18GB）
  # 外部基线对照
  llm_deepseek_r1: /root/autodl-tmp/models/DeepSeek-R1-Distill-Qwen-7B
  # ★ 嵌入（Qwen3-Embedding 系列）
  embedding: /root/autodl-tmp/models/Qwen3-Embedding-4B           # 论文主线
  embedding_8b: /root/autodl-tmp/models/Qwen3-Embedding-8B        # 对照
  embedding_small: /root/autodl-tmp/models/Qwen3-Embedding-0.6B   # 轻量对照
  # 外部嵌入基线（保留用于 Exp 3-1 对照）
  embedding_bge_large: /root/autodl-tmp/models/bge-large-zh-v1.5
  embedding_bge_m3: /root/autodl-tmp/models/bge-m3
  # NLI（第5章一致性判定）
  nli: /root/autodl-tmp/models/nli-zh
  # NER（论文 3.2.2 BERT-CRF）
  ner: /root/autodl-tmp/models/military-bert-crf
  # ★ 重排序（Qwen3-Reranker）
  reranker: /root/autodl-tmp/models/Qwen3-Reranker-8B

# ---- 软件栈版本（Qwen3 兼容）----
stack:
  python: "3.10"
  torch: "2.4.x"                    # Qwen3 推荐 torch≥2.4
  transformers: "4.51"              # Qwen3 需要较新 transformers
  peft: "0.14"                      # LoRA 适配 Qwen3
  vllm: "0.7"                       # Qwen3 支持
  faiss: "1.8.0"
  elasticsearch: "8.13"
  postgresql: "16"

# ---- 评测口径（论文 2.3.3 / 各章实验）----
eval:
  report_mean_std: true
  retrieval_metrics: [recall@1, recall@5, recall@10, recall@20, mrr, ndcg@10]
  generation_metrics: [em, f1, faithfulness, answer_relevance]
  robustness_metrics: [asr, pdr, rp, recall_clean, fpr, refusal_precision, refusal_recall, f1_robust]
  efficiency_metrics: [avg_retrieval_count, avg_latency_s, token_cost]
